<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | To-Do App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         APP CONTAINER
    ========================== -->
    <div class="app-container">

        <!-- =========================
             HEADER
        ========================== -->
        <header class="header">

            <div class="header-text">
                <h1>TaskFlow</h1>
                <p>Stay organized. Finish what matters.</p>
            </div>

            <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
                🌙
            </button>

        </header>

        <!-- =========================
             STATS
        ========================== -->
        <section class="stats">

            <div class="stat-card">
                <h3>Total</h3>
                <span id="totalTasks">0</span>
            </div>

            <div class="stat-card">
                <h3>Pending</h3>
                <span id="pendingTasks">0</span>
            </div>

            <div class="stat-card">
                <h3>Completed</h3>
                <span id="completedTasks">0</span>
            </div>

        </section>

        <!-- =========================
             TOOLBAR
        ========================== -->
        <section class="toolbar">

            <input
                type="text"
                id="searchInput"
                placeholder="Search tasks...">

            <select id="filterCategory">
                <option value="all">All Categories</option>
                <option value="Personal">Personal</option>
                <option value="Work">Work</option>
                <option value="Study">Study</option>
                <option value="Shopping">Shopping</option>
            </select>

            <button id="addTaskBtn">
                + New Task
            </button>

        </section>

        <!-- =========================
             FILTER BUTTONS
        ========================== -->
        <section class="filters">

            <button class="filter-btn active" data-filter="all">
                All
            </button>

            <button class="filter-btn" data-filter="active">
                Active
            </button>

            <button class="filter-btn" data-filter="completed">
                Completed
            </button>

        </section>

        <!-- =========================
             TASK LIST
        ========================== -->
        <main>

            <div id="taskList" class="task-list">

                <!-- JavaScript will create task cards here -->

            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">

                <div class="empty-icon">
                    📝
                </div>

                <h2>You're All Caught Up</h2>

                <p>Add a new task to start planning your day.</p>

            </div>

        </main>

    </div>

    <!-- =========================
         ADD / EDIT MODAL
    ========================== -->
    <div id="taskModal" class="modal" aria-hidden="true">

        <div class="modal-content">

            <h2 id="modalTitle">
                Add Task
            </h2>

            <form id="taskForm">

                <div class="form-group">

                    <label>Task Title</label>

                    <input
                        type="text"
                        id="taskTitle"
                        placeholder="Enter task title">

                </div>

                <div class="form-group">

                    <label>Description</label>

                    <textarea
                        id="taskDescription"
                        rows="3"
                        placeholder="Task description"></textarea>

                </div>

                <div class="form-row">

                    <div class="form-group">

                        <label>Category</label>

                        <select id="taskCategory">

                            <option>Personal</option>
                            <option>Work</option>
                            <option>Study</option>
                            <option>Shopping</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Priority</label>

                        <select id="taskPriority">

                            <option>Low</option>
                            <option>Medium</option>
                            <option>High</option>

                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label>Due Date</label>

                    <input
                        type="date"
                        id="taskDate">

                </div>

                <div class="modal-buttons">

                    <button
                        type="button"
                        id="cancelBtn">
                        Cancel
                    </button>

                    <button
                        type="submit"
                        id="saveTaskBtn">
                        Save Task
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
